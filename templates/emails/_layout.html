<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background:#f6f7f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f6f7f8;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0"
               style="background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
          <tr>
            <td style="padding:24px 28px 8px 28px;border-bottom:1px solid #f0f1f3;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <span style="font-size:18px;font-weight:600;color:#1f2937;">{{firmenname}}</span><br>
                    <span style="font-size:13px;color:#6b7280;">{{tagline}}</span>
                  </td>
                  <td align="right" style="vertical-align:middle;">
                    <img src="cid:logo" alt="Eierhof Groß Lafferde" width="56" height="56"
                         style="display:block;border:0;outline:none;text-decoration:none;">
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 28px;font-size:15px;line-height:1.55;color:#1f2937;">
              {{content}}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px 24px 28px;border-top:1px solid #f0f1f3;font-size:12px;color:#6b7280;line-height:1.5;">
              {{firmenname}} · {{adresse}} · {{plz}} {{ort}}<br>
              Tel. {{telefon}} · {{email}}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
